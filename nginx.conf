## Nginx config for budget-tracking
## Upload this file to: /etc/nginx/sites-available/budget-tracking
## Then run: ln -s /etc/nginx/sites-available/budget-tracking /etc/nginx/sites-enabled/

server {
    listen 443 ssl;
    server_name thinhle1234.ddns.net;

    # SSL - managed by certbot (auto-filled after: certbot --nginx -d thinhle1234.ddns.net)
    ssl_certificate /etc/letsencrypt/live/thinhle1234.ddns.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thinhle1234.ddns.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # [WEBHOOK] Telegram pushes updates here
    location /webhook/budget {
        proxy_pass http://localhost:3110/webhook/budget;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # [DASHBOARD] Web dashboard
    location / {
        proxy_pass http://localhost:3110;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name thinhle1234.ddns.net;
    return 301 https://$host$request_uri;
}
